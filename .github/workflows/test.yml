name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify CLI help
        run: node dist/index.js --help

      - name: Verify tool-plugin scaffold
        run: |
          node dist/index.js /tmp/test-tool --type tool-plugin --no-install
          test -f /tmp/test-tool/package.json

      - name: Verify mcp-server scaffold
        run: |
          node dist/index.js /tmp/test-mcp --type mcp-server --no-install
          test -f /tmp/test-mcp/package.json

      - name: Verify unavailable types are rejected
        run: |
          if node dist/index.js /tmp/test-provider --type provider-plugin --no-install; then
            echo "provider-plugin should be rejected until its template is available"
            exit 1
          fi
          test ! -e /tmp/test-provider

      - name: Verify non-interactive names are normalized
        run: |
          node dist/index.js "/tmp/My Plugin" --yes --no-install --no-git
          node -e "const pkg = require('/tmp/My Plugin/package.json'); if (pkg.name !== 'my-plugin') process.exit(1)"

      - name: Verify dry-run never mutates an existing directory
        run: |
          mkdir -p /tmp/test-dry
          printf 'keep me' > /tmp/test-dry/important.txt
          node dist/index.js /tmp/test-dry --yes --force --no-install --no-git --dry-run 2>&1 | grep -q "skipped"
          grep -q 'keep me' /tmp/test-dry/important.txt
          test ! -f /tmp/test-dry/package.json

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify CLI help
        run: node dist/index.js --help

      - name: Verify tool-plugin scaffold
        run: |
          node dist/index.js /tmp/test-tool --type tool-plugin --no-install
          ls /tmp/test-tool/package.json

      - name: Verify mcp-server scaffold
        run: |
          node dist/index.js /tmp/test-mcp --type mcp-server --no-install
          ls /tmp/test-mcp/package.json

      - name: Verify --yes and --dry-run
        run: |
          node dist/index.js /tmp/test-yes --yes --no-install
          ls /tmp/test-yes/package.json
          node dist/index.js /tmp/test-dry --yes --no-install --dry-run 2>&1 | grep -q "skipped"

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22]
        include:
          - os: ubuntu-latest
            node-version: 24

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify CLI help
        run: node dist/index.js --help

  scaffold-smoke:
    name: Generated project smoke tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm build

      - name: Generate and build every template
        run: |
          for type in tool-plugin channel-plugin provider-plugin mcp-server; do
            dir="/tmp/claw-$type"
            node dist/index.js "$dir" --type "$type" --no-install --no-git
            test -f "$dir/package.json"
            test -f "$dir/openclaw.plugin.json"
            ! grep -R "{{" "$dir" --exclude-dir=node_modules
            pnpm --dir "$dir" install --frozen-lockfile=false
            pnpm --dir "$dir" lint
            pnpm --dir "$dir" build
          done

      - name: Verify provider credential consistency
        run: |
          grep -q 'MY_PROVIDER_API_KEY' /tmp/claw-provider-plugin/src/index.ts
          grep -q 'MY_PROVIDER_API_KEY' /tmp/claw-provider-plugin/openclaw.plugin.json
          grep -q 'MY_PROVIDER_API_KEY' /tmp/claw-provider-plugin/README.md

      - name: Verify non-interactive names are normalized
        run: |
          node dist/index.js "/tmp/My Plugin" --yes --no-install --no-git
          node -e "const pkg = require('/tmp/My Plugin/package.json'); if (pkg.name !== 'my-plugin') process.exit(1)"

      - name: Verify dry-run never mutates an existing directory
        run: |
          mkdir -p /tmp/test-dry
          printf 'keep me' > /tmp/test-dry/important.txt
          node dist/index.js /tmp/test-dry --yes --force --no-install --no-git --dry-run 2>&1 | grep -q "skipped"
          grep -q 'keep me' /tmp/test-dry/important.txt
          test ! -f /tmp/test-dry/package.json

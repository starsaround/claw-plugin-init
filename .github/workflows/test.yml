name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22]
        include:
          - os: ubuntu-latest
            node-version: 24

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify CLI help
        run: node dist/index.js --help

  template-smoke:
    name: Template (${{ matrix.template }})
    runs-on: ubuntu-latest
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        template: [tool-plugin, channel-plugin, provider-plugin, mcp-server]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm build

      - name: Generate template
        run: |
          dir="/tmp/claw-${{ matrix.template }}"
          node dist/index.js "$dir" --type "${{ matrix.template }}" --no-install --no-git
          test -f "$dir/package.json"
          test -f "$dir/openclaw.plugin.json"
          ! grep -R "{{" "$dir" --exclude-dir=node_modules

      - name: Install generated project
        run: pnpm --dir "/tmp/claw-${{ matrix.template }}" install --frozen-lockfile=false

      - name: Lint generated project
        id: generated-lint
        continue-on-error: true
        run: pnpm --dir "/tmp/claw-${{ matrix.template }}" lint > "$RUNNER_TEMP/lint-${{ matrix.template }}.log" 2>&1

      - name: Upload generated lint diagnostics
        if: steps.generated-lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: lint-${{ matrix.template }}
          path: ${{ runner.temp }}/lint-${{ matrix.template }}.log

      - name: Report generated lint errors
        if: steps.generated-lint.outcome == 'failure'
        run: |
          cat "$RUNNER_TEMP/lint-${{ matrix.template }}.log"
          exit 1

      - name: Build generated project
        run: pnpm --dir "/tmp/claw-${{ matrix.template }}" build

      - name: Verify provider credential consistency
        if: matrix.template == 'provider-plugin'
        run: |
          grep -q 'CLAW_PROVIDER_PLUGIN_API_KEY' /tmp/claw-provider-plugin/src/index.ts
          grep -q 'CLAW_PROVIDER_PLUGIN_API_KEY' /tmp/claw-provider-plugin/openclaw.plugin.json
          grep -q 'CLAW_PROVIDER_PLUGIN_API_KEY' /tmp/claw-provider-plugin/README.md

  cli-safety:
    name: CLI safety regressions
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm build

      - name: Verify non-interactive names are normalized
        run: |
          node dist/index.js "/tmp/My Plugin" --yes --no-install --no-git
          node -e "const pkg = require('/tmp/My Plugin/package.json'); if (pkg.name !== 'my-plugin') process.exit(1)"

      - name: Verify dry-run never mutates an existing directory
        run: |
          mkdir -p /tmp/test-dry
          printf 'keep me' > /tmp/test-dry/important.txt
          node dist/index.js /tmp/test-dry --yes --force --no-install --no-git --dry-run 2>&1 | grep -q "skipped"
          grep -q 'keep me' /tmp/test-dry/important.txt
          test ! -f /tmp/test-dry/package.json
